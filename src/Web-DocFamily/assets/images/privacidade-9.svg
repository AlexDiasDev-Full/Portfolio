<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a1e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2c003e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="phoneGrad9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="chatBtn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <linearGradient id="warnBtn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d63031"/>
      <stop offset="100%" style="stop-color:#e17055"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg9)" rx="12"/>
  <circle cx="680" cy="90" r="130" fill="#6c3483" opacity="0.15"/>
  <circle cx="70" cy="400" r="110" fill="#1a5276" opacity="0.12"/>
  <!-- Glow effect -->
  <ellipse cx="400" cy="240" rx="350" ry="200" fill="#6c3483" opacity="0.05"/>
  <!-- Title -->
  <text x="50" y="52" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#a855f7">REQUISITOS DE INTERFACE</text>
  <text x="50" y="75" font-family="Arial, sans-serif" font-size="13" fill="#c084fc">RDC 44/09 · Assistência Farmacêutica · Alertas Obrigatórios</text>

  <!-- Smartphone body -->
  <rect x="80" y="95" width="190" height="340" rx="22" fill="url(#phoneGrad9)" stroke="#6c3483" stroke-width="3"/>
  <rect x="88" y="112" width="174" height="306" rx="10" fill="#0a0a1a"/>
  <!-- Status bar -->
  <rect x="88" y="112" width="174" height="20" rx="10" fill="#1a0a2e"/>
  <text x="175" y="126" font-family="Arial, sans-serif" font-size="8" fill="#c084fc" text-anchor="middle">PharmaApp</text>
  <!-- Notch -->
  <rect x="145" y="100" width="60" height="16" rx="8" fill="#1c1c2e"/>

  <!-- Product detail section on phone -->
  <rect x="92" y="136" width="166" height="60" rx="6" fill="#16213e"/>
  <text x="175" y="153" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0" text-anchor="middle" font-weight="bold">Amoxicilina 500mg</text>
  <text x="100" y="167" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">DCB: Amoxicilina Tri-hidratada</text>
  <text x="100" y="178" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">Anvisa: 1.2345.0001.001-0</text>
  <text x="100" y="189" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">Lab: EMS S/A</text>

  <!-- Warning banner -->
  <rect x="92" y="200" width="166" height="42" rx="5" fill="url(#warnBtn)"/>
  <text x="175" y="215" font-family="Arial, sans-serif" font-size="6.5" fill="#fff" text-anchor="middle" font-weight="bold">⚠ ALERTA OBRIGATÓRIO</text>
  <text x="175" y="226" font-family="Arial, sans-serif" font-size="5.5" fill="#ffe0e0" text-anchor="middle">SE PERSISTIREM OS SINTOMAS,</text>
  <text x="175" y="235" font-family="Arial, sans-serif" font-size="5.5" fill="#ffe0e0" text-anchor="middle">O MÉDICO DEVERÁ SER CONSULTADO.</text>

  <!-- Chat button -->
  <rect x="92" y="250" width="166" height="36" rx="18" fill="url(#chatBtn)"/>
  <text x="175" y="263" font-family="Arial, sans-serif" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">💬 Falar com Farmacêutico</text>
  <text x="175" y="278" font-family="Arial, sans-serif" font-size="7" fill="#d1faf8" text-anchor="middle">Atendimento 24h · Tempo Real</text>

  <!-- Product info badges -->
  <rect x="92" y="295" width="78" height="28" rx="5" fill="#1e3a5f"/>
  <text x="131" y="307" font-family="Arial, sans-serif" font-size="6.5" fill="#93c5fd" text-anchor="middle">Princípio Ativo</text>
  <text x="131" y="318" font-family="Arial, sans-serif" font-size="6" fill="#bfdbfe" text-anchor="middle">DCB Completo</text>
  <rect x="178" y="295" width="80" height="28" rx="5" fill="#1e3a5f"/>
  <text x="218" y="307" font-family="Arial, sans-serif" font-size="6.5" fill="#93c5fd" text-anchor="middle">Nº Registro Anvisa</text>
  <text x="218" y="318" font-family="Arial, sans-serif" font-size="6" fill="#bfdbfe" text-anchor="middle">Visível antes da compra</text>

  <!-- Bottom nav bar -->
  <rect x="88" y="386" width="174" height="32" rx="6" fill="#1a0a2e"/>
  <text x="120" y="406" font-family="Arial, sans-serif" font-size="16" fill="#a855f7" text-anchor="middle">🏠</text>
  <text x="155" y="406" font-family="Arial, sans-serif" font-size="16" fill="#6c3483" text-anchor="middle">🔍</text>
  <text x="190" y="406" font-family="Arial, sans-serif" font-size="16" fill="#6c3483" text-anchor="middle">🛒</text>
  <text x="225" y="406" font-family="Arial, sans-serif" font-size="16" fill="#6c3483" text-anchor="middle">👤</text>

  <!-- Chat window beside phone -->
  <rect x="300" y="115" width="230" height="200" rx="12" fill="#1a0a2e" stroke="#6c3483" stroke-width="1.5"/>
  <!-- Chat header -->
  <rect x="300" y="115" width="230" height="42" rx="12" fill="#6c3483"/>
  <circle cx="326" cy="136" r="14" fill="#a855f7"/>
  <text x="326" y="140" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Rx</text>
  <text x="355" y="131" font-family="Arial, sans-serif" font-size="9.5" fill="#fff" font-weight="bold">Farmacêutica Online</text>
  <text x="355" y="145" font-family="Arial, sans-serif" font-size="8" fill="#e9d5ff">● Disponível agora</text>
  <!-- Chat bubbles -->
  <rect x="314" y="170" width="140" height="30" rx="10" fill="#374151"/>
  <text x="323" y="183" font-family="Arial, sans-serif" font-size="7.5" fill="#e5e7eb">Posso tomar junto com</text>
  <text x="323" y="194" font-family="Arial, sans-serif" font-size="7.5" fill="#e5e7eb">Metformina?</text>
  <rect x="330" y="210" width="170" height="40" rx="10" fill="#6c3483"/>
  <text x="415" y="223" font-family="Arial, sans-serif" font-size="7.5" fill="#fff" text-anchor="middle">Sim, não há interação</text>
  <text x="415" y="234" font-family="Arial, sans-serif" font-size="7.5" fill="#fff" text-anchor="middle">conhecida. Tome com água</text>
  <text x="415" y="245" font-family="Arial, sans-serif" font-size="7.5" fill="#e9d5ff" text-anchor="middle">e após refeições. ✓</text>
  <!-- Chat input area -->
  <rect x="308" y="286" width="214" height="25" rx="12" fill="#2d1b4e" stroke="#6c3483" stroke-width="1"/>
  <text x="322" y="303" font-family="Arial, sans-serif" font-size="8" fill="#6b7280">Digite sua dúvida...</text>
  <circle cx="504" cy="299" r="10" fill="#a855f7"/>
  <text x="504" y="303" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">➤</text>

  <!-- Right panel: RDC rules -->
  <rect x="545" y="115" width="220" height="260" rx="10" fill="#0f0a1e" stroke="#6c3483" stroke-width="1.5"/>
  <text x="655" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#a855f7" text-anchor="middle">RDC 44/09 · RDC 96/08</text>
  <line x1="558" y1="150" x2="752" y2="150" stroke="#6c3483" stroke-width="1"/>
  <!-- Rules list -->
  <rect x="558" y="160" width="196" height="36" rx="6" fill="#1a0a2e"/>
  <text x="568" y="174" font-family="Arial, sans-serif" font-size="8" fill="#a855f7" font-weight="bold">📞 Assistência Farmacêutica</text>
  <text x="568" y="187" font-family="Arial, sans-serif" font-size="7.5" fill="#94a3b8">Chat/Voz em tempo integral</text>
  <rect x="558" y="202" width="196" height="36" rx="6" fill="#1a0a2e"/>
  <text x="568" y="216" font-family="Arial, sans-serif" font-size="8" fill="#f87171" font-weight="bold">⚠ Alerta Obrigatório</text>
  <text x="568" y="229" font-family="Arial, sans-serif" font-size="7.5" fill="#94a3b8">Advertência padrão visível</text>
  <rect x="558" y="244" width="196" height="36" rx="6" fill="#1a0a2e"/>
  <text x="568" y="258" font-family="Arial, sans-serif" font-size="8" fill="#a855f7" font-weight="bold">💊 Dados do Produto</text>
  <text x="568" y="271" font-family="Arial, sans-serif" font-size="7.5" fill="#94a3b8">DCB, Anvisa, Laboratório</text>
  <rect x="558" y="286" width="196" height="36" rx="6" fill="#1a0a2e"/>
  <text x="568" y="300" font-family="Arial, sans-serif" font-size="8" fill="#60a5fa" font-weight="bold">🔒 Publicidade Controlada</text>
  <text x="568" y="313" font-family="Arial, sans-serif" font-size="7.5" fill="#94a3b8">Sem promoções enganosas</text>
  <!-- Badge -->
  <rect x="558" y="330" width="196" height="32" rx="8" fill="#6c3483" opacity="0.6"/>
  <text x="655" y="350" font-family="Arial, sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">Conformidade Total Garantida</text>

  <!-- Bottom bar -->
  <rect x="0" y="435" width="800" height="45" fill="#0f0a1e"/>
  <text x="400" y="462" font-family="Arial, sans-serif" font-size="11" fill="#a855f7" text-anchor="middle" font-weight="bold">DocFamily · Interface RDC 44/09 · Assistência Farmacêutica 24h</text>
</svg>
