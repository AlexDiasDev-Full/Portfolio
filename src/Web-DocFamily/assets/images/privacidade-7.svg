<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2342;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a5276;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2980b9"/>
      <stop offset="100%" style="stop-color:#1abc9c"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2833"/>
      <stop offset="100%" style="stop-color:#2c3e50"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg7)" rx="12"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="80" r="120" fill="#1a5276" opacity="0.4"/>
  <circle cx="100" cy="400" r="90" fill="#1a5276" opacity="0.3"/>
  <!-- Title -->
  <text x="50" y="58" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1abc9c">FARMÁCIA POPULAR DIGITAL</text>
  <text x="50" y="82" font-family="Arial, sans-serif" font-size="13" fill="#aed6f1">Entregas em Domicílio · SUS Digital · 2026</text>
  <!-- Delivery Box -->
  <rect x="50" y="110" width="200" height="160" rx="10" fill="url(#boxGrad)" opacity="0.95"/>
  <rect x="50" y="110" width="200" height="30" rx="10" fill="#1abc9c"/>
  <rect x="50" y="130" width="200" height="10" fill="#1abc9c"/>
  <!-- Box tape lines -->
  <line x1="150" y1="110" x2="150" y2="270" stroke="#0a2342" stroke-width="3" stroke-dasharray="6,4"/>
  <line x1="50" y1="190" x2="250" y2="190" stroke="#0a2342" stroke-width="3" stroke-dasharray="6,4"/>
  <!-- Lock icon on box -->
  <rect x="125" y="200" width="50" height="38" rx="5" fill="#0a2342"/>
  <path d="M135 200 Q150 180 165 200" stroke="#fff" stroke-width="4" fill="none"/>
  <circle cx="150" cy="216" r="6" fill="#1abc9c"/>
  <rect x="147" y="218" width="6" height="10" rx="2" fill="#1abc9c"/>
  <!-- SUS Seal -->
  <circle cx="220" cy="125" r="20" fill="#fff"/>
  <text x="220" y="121" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#1a5276" text-anchor="middle">MINISTÉRIO</text>
  <text x="220" y="130" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#1a5276" text-anchor="middle">DA SAÚDE</text>
  <text x="220" y="139" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#e74c3c" text-anchor="middle">SUS</text>
  <!-- Box label -->
  <rect x="75" y="225" width="150" height="30" rx="4" fill="#fff" opacity="0.9"/>
  <text x="150" y="237" font-family="Arial, sans-serif" font-size="9" fill="#0a2342" font-weight="bold" text-anchor="middle">LACRADO E INVIOLÁVEL</text>
  <text x="150" y="250" font-family="Arial, sans-serif" font-size="8" fill="#1a5276" text-anchor="middle">Medicamento Controlado</text>
  <!-- Smartphone -->
  <rect x="310" y="95" width="160" height="290" rx="18" fill="url(#phoneGrad)" stroke="#34495e" stroke-width="3"/>
  <rect x="316" y="110" width="148" height="255" rx="6" fill="#0d1b2a"/>
  <!-- App header -->
  <rect x="316" y="110" width="148" height="38" rx="6" fill="#1a5276"/>
  <text x="390" y="125" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#fff" text-anchor="middle">Meu SUS Digital</text>
  <text x="390" y="140" font-family="Arial, sans-serif" font-size="7" fill="#aed6f1" text-anchor="middle">Farmácia Popular</text>
  <!-- QR Code area -->
  <rect x="336" y="158" width="108" height="108" rx="6" fill="#fff"/>
  <rect x="342" y="164" width="28" height="28" rx="2" fill="#1a5276"/>
  <rect x="346" y="168" width="20" height="20" rx="1" fill="#fff"/>
  <rect x="350" y="172" width="12" height="12" rx="1" fill="#1a5276"/>
  <rect x="410" y="164" width="28" height="28" rx="2" fill="#1a5276"/>
  <rect x="414" y="168" width="20" height="20" rx="1" fill="#fff"/>
  <rect x="418" y="172" width="12" height="12" rx="1" fill="#1a5276"/>
  <rect x="342" y="232" width="28" height="28" rx="2" fill="#1a5276"/>
  <rect x="346" y="236" width="20" height="20" rx="1" fill="#fff"/>
  <rect x="350" y="240" width="12" height="12" rx="1" fill="#1a5276"/>
  <!-- QR fill lines -->
  <line x1="378" y1="164" x2="402" y2="164" stroke="#1a5276" stroke-width="4"/>
  <line x1="378" y1="172" x2="402" y2="172" stroke="#1a5276" stroke-width="4"/>
  <line x1="378" y1="180" x2="402" y2="180" stroke="#1a5276" stroke-width="4"/>
  <line x1="378" y1="188" x2="402" y2="188" stroke="#1a5276" stroke-width="4"/>
  <line x1="342" y1="200" x2="402" y2="200" stroke="#1a5276" stroke-width="4"/>
  <line x1="342" y1="210" x2="402" y2="210" stroke="#1a5276" stroke-width="4"/>
  <line x1="410" y1="200" x2="440" y2="200" stroke="#1a5276" stroke-width="4"/>
  <line x1="410" y1="210" x2="440" y2="210" stroke="#1a5276" stroke-width="4"/>
  <line x1="410" y1="220" x2="440" y2="220" stroke="#1a5276" stroke-width="4"/>
  <line x1="410" y1="230" x2="440" y2="230" stroke="#1a5276" stroke-width="4"/>
  <!-- Token label -->
  <text x="390" y="280" font-family="Arial, sans-serif" font-size="8" fill="#aed6f1" text-anchor="middle">Token de Autorização</text>
  <!-- Auth button -->
  <rect x="330" y="288" width="120" height="28" rx="14" fill="#1abc9c"/>
  <text x="390" y="306" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#fff" text-anchor="middle">✓ AUTORIZAR ENTREGA</text>
  <!-- Stats label -->
  <text x="390" y="338" font-family="Arial, sans-serif" font-size="7" fill="#5d6d7e" text-anchor="middle">Redução de ~35% na Dapagliflozina</text>
  <text x="390" y="350" font-family="Arial, sans-serif" font-size="7" fill="#5d6d7e" text-anchor="middle">Fraldas Geriátricas · 2026</text>
  <!-- Arrow connecting box and phone -->
  <path d="M260 190 Q285 190 300 190" stroke="#1abc9c" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1abc9c"/>
    </marker>
  </defs>
  <!-- Right side info cards -->
  <rect x="510" y="110" width="240" height="70" rx="8" fill="#1a5276" opacity="0.7"/>
  <text x="530" y="135" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1abc9c">🚚  Entrega em Domicílio</text>
  <text x="530" y="152" font-family="Arial, sans-serif" font-size="9" fill="#aed6f1">Para idosos (PCDs) com embalagem</text>
  <text x="530" y="166" font-family="Arial, sans-serif" font-size="9" fill="#aed6f1">lacrada e rastreável</text>
  <rect x="510" y="194" width="240" height="70" rx="8" fill="#1a5276" opacity="0.7"/>
  <text x="530" y="219" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1abc9c">📱  Token SUS Digital</text>
  <text x="530" y="236" font-family="Arial, sans-serif" font-size="9" fill="#aed6f1">Código QR gerado pelo app</text>
  <text x="530" y="250" font-family="Arial, sans-serif" font-size="9" fill="#aed6f1">Meu SUS Digital</text>
  <rect x="510" y="278" width="240" height="70" rx="8" fill="#1a5276" opacity="0.7"/>
  <text x="530" y="303" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1abc9c">💊  Farmácia Popular</text>
  <text x="530" y="320" font-family="Arial, sans-serif" font-size="9" fill="#aed6f1">Atualização 2026: entregas</text>
  <text x="530" y="334" font-family="Arial, sans-serif" font-size="9" fill="#aed6f1">domiciliares definitivamente permitidas</text>
  <!-- Bottom bar -->
  <rect x="0" y="435" width="800" height="45" rx="0" fill="#0a2342"/>
  <text x="400" y="462" font-family="Arial, sans-serif" font-size="11" fill="#1abc9c" text-anchor="middle" font-weight="bold">DocFamily · Farmácia Popular Digital · Lei nº 15.357/2026</text>
</svg>
